[mgr]
ratio = [1, 3, 4]
sort_by = "extension"
sort_sensitive = true
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "btime"

[preview]
wrap = "yes"
image_filter = "lanczos3"

# ================================
# Plugin Previewers
# ================================
[[plugin.prepend_previewers]]
mime = "image/*"
run = "exif-preview"

[[plugin.prepend_previewers]]
mime = "audio/*"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "video/*"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/subrip"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/postscript"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/bittorrent"
run = "torrent-preview"

[[plugin.prepend_previewers]]
url = "*.{md,markdown,txt}"
run = "mdv-previewer"

[[plugin.prepend_previewers]]
url = "*.{md,markdown,txt}"
run = "mediainfo"

# ================================
# Plugin Preloaders
# ================================
[[plugin.prepend_preloaders]]
mime = "image/*"
run = "exif-preview"

[[plugin.prepend_preloaders]]
mime = "audio/*"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "video/*"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/subrip"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/postscript"
run = "mediainfo"

[[plugin.prepend_preloaders]]
url = "*.{md,markdown,txt}"
run = "mdv-previewer"

[[plugin.prepend_preloaders]]
url = "*.{md,markdown,txt}"
run = "mediainfo"

# ================================
# Tasks
# ================================
[tasks]
image_alloc = 1073741824  # = 1024*1024*1024 = 1024MB


