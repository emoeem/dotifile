# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME


# 字体设置
font_family	ComicShannsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13

# 设置备用字体
symbol_map U+4E00-U+9FFF LXGW ZhenKai GB 
symbol_map U+3400-U+4DBF LXGW ZhenKai GB 
symbol_map U+20000-U+2A6DF LXGW ZhenKai GB 
symbol_map U+2A700-U+2B73F LXGW ZhenKai GB 
symbol_map U+2B740-U+2B81F LXGW ZhenKai GB 
symbol_map U+2B820-U+2CEAF LXGW ZhenKai GB 
